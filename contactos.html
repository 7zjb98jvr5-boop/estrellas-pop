<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Página de Contacto</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            padding: 20px;
            background-color: #f4f4f4;
        }

        form {
            background: white;
            padding: 20px;
            border-radius: 8px;
            max-width: 400px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        input,
        textarea {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: #28a745;
            color: white;
            border: none;
            border-radius: 4px;
            cursor: pointer;
        }

        button:hover {
            background-color: #218838;
        }

        .whatsapp-btn {
            display: block;
            text-align: center;
            margin-top: 15px;
            padding: 10px;
            background-color: #25D366;
            color: white;
            text-decoration: none;
            border-radius: 4px;
        }

        .whatsapp-btn:hover {
            background-color: #1ebe5d;
        }
    </style>
</head>

<body>

    <h2>Contáctanos</h2>

    <form action="https://api.web3forms.com/submit" method="POST">

        <input
            type="hidden"
            name="access_key"
            value="9263caff-8492-47ab-9b97-8015958b4241"
        >

        <label>Nombre Completo:</label>
        <input
            type="text"
            name="nombre"
            placeholder="Escribe tu nombre"
            required
        >

        <label>Correo Electrónico:</label>
        <input
            type="email"
            name="email"
            placeholder="correo@ejemplo.com"
            required
        >

        <label>Mensaje:</label>
        <textarea
            name="mensaje"
            rows="5"
            placeholder="¿En qué podemos ayudarte?"
            required>
        </textarea>

        <input
            type="checkbox"
            name="botcheck"
            style="display:none"
        >

        <button type="submit">
            Enviar Formulario
        </button>

    </form>

    <a
        class="whatsapp-btn"
        href="https://wa.me/573103295097"
        target="_blank"
    >
        Contactar por WhatsApp
    </a>

</body>
</html>
