<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Lady Gaga</title>

<style>

body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, black, purple);
    color: white;
    text-align: center;
}

.volver {
    display: inline-block;
    margin: 20px;
    padding: 10px 15px;
    background: hotpink;
    color: white;
    text-decoration: none;
    border-radius: 5px;
}

h1 {
    margin-top: 10px;
}

iframe {
    display: block;
    margin: 20px auto;
}

/* galería */
.galeria {
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 15px;
    padding: 20px;
}

.galeria img {
    width: 200px;
    border-radius: 10px;
    transition: 0.3s;
}

.galeria img:hover {
    transform: scale(1.1);
}
</style>
</head>

<body>
        <div class="intro-star">

</div>

<a href="index.html" class="volver">⬅ Volver</a>

<h1>Lady Gaga</h1>

<!-- 🎧 SPOTIFY (YA INSERTADO) -->
<iframe data-testid="embed-iframe" style="border-radius:12px" 
src="https://open.spotify.com/embed/track/0SiywuOBRcynK0uKGWdCnn?utm_source=generator" 
width="300" height="352" frameBorder="0" 
allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" 
loading="lazy">
</iframe>

<!-- 📸 FOTOS -->
<div class="galeria">
    <img src="imagenes/gaga1.jpg">
    <img src="imagenes/gaga2.jpg">
    <img src="imagenes/gaga3.jpg">
        <img src="imagenes/gaga4.jpg">
    <img src="imagenes/gaga5.jpg">
</div>
<script>
document.addEventListener("mousemove", function(e) {
    document.body.style.background = `
    radial-gradient(circle at ${e.clientX}px ${e.clientY}px,
    rgba(255, 0, 150, 0.5),
    black 40%)
    `;
});
</script>
<script>
document.querySelectorAll(".galeria img").forEach(img => {
    img.onclick = () => {
        const grande = document.createElement("img");
        grande.src = img.src;
        grande.style = "position:fixed;top:0;left:0;width:100%;height:100%;object-fit:contain;background:black;";
        grande.onclick = () => grande.remove();
        document.body.appendChild(grande);
    }
});
</script>
<h3>Curiosidades</h3>
<ul>
    <li>Su nombre real es Stefani Germanotta</li>
    <li>En los MTV Video Music Awards 2010, usó un vestido hecho con carne auténtica, lo que generó polémica mundial.</li>
</ul>

</body>
</html>
</html>
